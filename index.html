<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Real Ronaldo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls {
            margin-bottom: 20px;
            background: rgb(0, 110, 255);
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        canvas {
            background-color: white;
            border: 2px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: crosshair;
            display: none; /* Hidden until image is loaded */
        }

        h2 {
            margin: 0 0 10px 0;
            color: #333;
        }

        input[type="file"] {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>1. Upload "images (14).jpg"</h2>
        <p>Select your image file. The browser will analyze the pixels.</p>
        <input type="file" id="imageLoader" accept="image/*">
        <h3 id="instructionText" style="display: none; color: #d32f2f; margin-top: 15px;">2. Now CLICK and DRAG on the canvas below!</h3>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const imageLoader = document.getElementById('imageLoader');
        const instructionText = document.getElementById('instructionText');

        let particles = [];
        let targetPixels = [];
        let isDrawing = false;

        // Particle class that handles the movement from the mouse to the final pixel location
        class Particle {
            constructor(startX, startY, targetX, targetY, color) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                this.color = color;
                
                // Random explosion velocity when created
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                
                this.friction = 0.85; // Slows down the explosion
                this.easing = 0.05 + Math.random() * 0.05; // Speed at which it moves to target
            }

            update() {
                // Apply explosion velocity and friction
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= this.friction;
                this.vy *= this.friction;

                // Ease towards the actual image pixel target
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                
                this.x += dx * this.easing;
                this.y += dy * this.easing;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 2, 2); // 2x2 pixel size
            }
        }

        // Handle Image Upload
        imageLoader.addEventListener('change', handleImage, false);

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Set canvas size to match image (max 600px width to fit screen)
                    const scale = Math.min(600 / img.width, 1);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    
                    // Show canvas and instructions
                    canvas.style.display = 'block';
                    instructionText.style.display = 'block';

                    // Draw image temporarily to read its pixels
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Read pixels
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    targetPixels = [];
                    particles = [];
                    
                    // Clear the canvas so it's blank for you to draw on
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // Scan every 3rd pixel (adjust for density/performance)
                    for (let y = 0; y < canvas.height; y += 3) {
                        for (let x = 0; x < canvas.width; x += 3) {
                            const index = (y * canvas.width + x) * 4;
                            const r = data[index];
                            const g = data[index + 1];
                            const b = data[index + 2];
                            const alpha = data[index + 3];

                            // Check if the pixel is dark (Targeting the black stencil)
                            // We ignore white/light background pixels
                            if (alpha > 128 && (r < 100 && g < 100 && b < 100)) {
                                targetPixels.push({
                                    x: x, 
                                    y: y, 
                                    color: `rgb(${r},${g},${b})`
                                });
                            }
                        }
                    }

                    // Shuffle pixels so they assemble randomly rather than top-to-bottom
                    targetPixels.sort(() => Math.random() - 0.5);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        // Handle Drawing Interactions
        function spawnParticles(e) {
            if (!isDrawing || targetPixels.length === 0) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX || e.touches[0].clientX) - rect.left;
            const mouseY = (e.clientY || e.touches[0].clientY) - rect.top;

            // Spawn multiple pixels per mouse movement tick
            for (let i = 0; i < 40; i++) {
                if (targetPixels.length === 0) break;
                
                const target = targetPixels.pop();
                particles.push(new Particle(mouseX, mouseY, target.x, target.y, target.color));
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; spawnParticles(e); });
        canvas.addEventListener('mousemove', spawnParticles);
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => { isDrawing = true; spawnParticles(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { spawnParticles(e); e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', () => isDrawing = false);

        // Animation Loop
        function animate() {
            // Slight fade effect for a cool trail
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Redraw final resting pixels so they don't fade away entirely
            particles.forEach(p => p.draw());
            particles.forEach(p => p.update());

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
